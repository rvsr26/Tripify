name: mobile_flutter
description: A new Flutter application for Tripify.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  http: ^1.1.0
  provider: ^6.0.5
  shared_preferences: ^2.2.0
  lucide_icons: ^0.257.0
  google_fonts: ^6.1.0
  intl: ^0.18.1
  socket_io_client: ^2.0.3
  flutter_dotenv: ^5.1.0
  flutter_staggered_grid_view: ^0.7.0

  cached_network_image: ^3.3.0
  google_maps_flutter: ^2.5.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/data/curated_plans.json

